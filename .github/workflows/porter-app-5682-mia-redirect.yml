"on":
    push:
        branches:
            - main
name: Deploy to mia-redirect
jobs:
    porter-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            - name: Set Github tag
              id: vars
              run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
            - name: Setup porter
              uses: porter-dev/setup-porter@v0.1.0
            - name: Deploy stack
              timeout-minutes: 30
              run: porter apply
              env:
                PORTER_APP_NAME: mia-redirect
                PORTER_CLUSTER: "5682"
                PORTER_DEPLOYMENT_TARGET_ID: 76a8cd9f-7321-45ae-aa15-6a679e9f8fb9
                PORTER_HOST: https://dashboard.porter.run
                PORTER_PROJECT: "18918"
                PORTER_TAG: ${{ steps.vars.outputs.sha_short }}
                PORTER_TOKEN: ${{ secrets.PORTER_APP_18918_16683 }}
